<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noita 魔杖全量穷举查询器</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar for Advanced Filters -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>Advanced Filter</h2>
            </div>
            
            <div class="filter-section">
                <div class="filter-group">
                    <span class="filter-label">魔杖槽位 (Wand Slots)</span>
                    <div style="display: flex; gap: 10px; align-items: center;">
                        <input type="number" id="minSlots" placeholder="Min" min="1" max="8" style="padding: 8px;">
                        <span style="color: var(--text-secondary)">-</span>
                        <input type="number" id="maxSlots" placeholder="Max" min="1" max="8" style="padding: 8px;">
                    </div>
                </div>

                <div class="filter-group">
                    <span class="filter-label">法术筛选 (Spells Filter)</span>
                    <div id="spellFilters" class="spell-filters-list">
                        <!-- Spells will be injected by JS -->
                    </div>
                </div>
            </div>

            <div class="sidebar-footer" style="margin-top: 20px; font-size: 0.8rem; color: var(--text-secondary);">
                <p>点击“查询”应用筛选条件</p>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main>
            <div class="container-main">
                <header>
                    <h1>Noita Wand Analytics</h1>
                    <p class="subtitle">7.68 Million Combinations • High Performance Filtering</p>
                </header>

                <div class="search-box">
                    <input type="number" id="targetCount" placeholder="输入目标 FLY_DOWNWARDS 数量 (例如: 54)" min="0">
                    <button id="searchBtn">查询最简组合</button>
                </div>

                <div id="status" class="status-msg">已准备就绪</div>

                <div class="results-container" id="resultsContainer">
                    <div class="table-wrapper">
                        <table id="resultsTable">
                            <thead>
                                <tr>
                                    <th>最简魔杖序列 (Wand Sequence)</th>
                                    <th>槽位 (Slots)</th>
                                </tr>
                            </thead>
                            <tbody id="resultsBody">
                                <!-- 动态插入 -->
                            </tbody>
                        </table>
                    </div>
                </div>

                <footer style="text-align: left; margin-top: 80px;">
                    <p style="color: var(--text-secondary); margin-bottom: 5px;">基于 <a href="https://github.com/NathanSnail/wand_eval_tree" target="_blank" style="color: var(--accent-color); text-decoration: none;">NathanSnail/wand_eval_tree</a> 模拟引擎</p>
                    <p style="color: #4b5563;">在线查询地址: <a href="https://asmallhamis.github.io/BURST_8-DIVIDE_10-DIVIDE_3-ADD_TRIGGER-DIVIDE_4-DIVIDE_2-TAU-FLY_DOWNWARDS/" style="color: inherit;">GitHub Pages</a></p>
                </footer>
            </div>
        </main>
    </div>

    <!-- Mobile Sidebar Toggle -->
    <button class="mobile-toggle" id="mobileToggle">
        <span>☰</span>
    </button>

    <script src="app.js"></script>
</body>
</html>
