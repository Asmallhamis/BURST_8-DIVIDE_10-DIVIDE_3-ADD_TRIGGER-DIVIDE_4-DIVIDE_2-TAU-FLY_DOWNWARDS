<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noita 魔杖全量穷举查询器</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar for Advanced Filters -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header" style="display: flex; justify-content: space-between; align-items: center;">
                <h2 data-i18n="filter_title">Advanced Filter</h2>
                <button id="langToggle" style="background: rgba(255,255,255,0.1); border: 1px solid var(--border-color); color: var(--accent-color); padding: 4px 8px; border-radius: 6px; cursor: pointer; font-size: 0.75rem;">EN / ZH</button>
            </div>
            
            <div class="filter-section">
                <div class="filter-group">
                    <span class="filter-label" data-i18n="slots_label">Wand Slots</span>
                    <div style="display: flex; gap: 10px; align-items: center;">
                        <input type="number" id="minSlots" placeholder="Min" min="1" max="8" style="padding: 8px;">
                        <span style="color: var(--text-secondary)">-</span>
                        <input type="number" id="maxSlots" placeholder="Max" min="1" max="8" style="padding: 8px;">
                    </div>
                </div>

                <div class="filter-group">
                    <span class="filter-label" data-i18n="spells_label">Spells Filter</span>
                    <div id="spellFilters" class="spell-filters-list">
                        <!-- Spells will be injected by JS -->
                    </div>
                </div>
            </div>

            <div class="sidebar-footer" style="margin-top: 20px; font-size: 0.8rem; color: var(--text-secondary);">
                <p data-i18n="sidebar_footer">Click 'Search' to apply filters</p>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main>
            <div class="container-main">
                <header>
                    <h1 data-i18n="nav_title">Noita Wand Analytics</h1>
                    <p class="subtitle" data-i18n="nav_subtitle">7.68 Million Combinations • High Performance Filtering</p>
                </header>

                <div class="search-box">
                    <input type="number" id="targetCount" placeholder="Target FLY_DOWNWARDS count (e.g. 54)" data-i18n-placeholder="search_placeholder" min="0">
                    <button id="searchBtn" data-i18n="search_btn">Search Combinations</button>
                </div>

                <div id="status" class="status-msg" data-i18n="status_ready">Ready</div>

                <div class="results-container" id="resultsContainer">
                    <div class="table-wrapper">
                        <table id="resultsTable">
                            <thead>
                                <tr>
                                    <th data-i18n="table_seq">Wand Sequence</th>
                                    <th data-i18n="table_slots">Slots</th>
                                </tr>
                            </thead>
                            <tbody id="resultsBody">
                                <!-- 动态插入 -->
                            </tbody>
                        </table>
                    </div>
                </div>

                <footer style="text-align: left; margin-top: 80px;">
                    <p style="color: var(--text-secondary); margin-bottom: 5px;">Based on <a href="https://github.com/NathanSnail/wand_eval_tree" target="_blank" style="color: var(--accent-color); text-decoration: none;">NathanSnail/wand_eval_tree</a></p>
                    <p style="color: #4b5563;">Online: <a href="https://asmallhamis.github.io/BURST_8-DIVIDE_10-DIVIDE_3-ADD_TRIGGER-DIVIDE_4-DIVIDE_2-TAU-FLY_DOWNWARDS/" style="color: inherit;">GitHub Pages</a></p>
                </footer>
            </div>
        </main>
    </div>

    <!-- Mobile Sidebar Toggle -->
    <button class="mobile-toggle" id="mobileToggle">
        <span>☰</span>
    </button>

    <script src="app.js"></script>
</body>
</html>
